<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramais | GERMER</title>
    <style>
        * {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    }
    body {
        background-color: #ffffff;
        height: 100vh;
        font-family: Arial, sans-serif;
    }
    header {
        background-color: #f26522;
        height: 14vh;
        display: flex;
        align-items: center;
    }
    #logo {
        height: 80px;
        width: 220px;
        margin-left: 12vw;
    }
    #pesquisa {
        height: 40px;
        width: 450px;
        margin-left: 150px;
    }
    #filtro {
        position: relative;
        display: inline-block;
    }
    #opcoes-filtro {
        display: none;
        position: absolute;
        box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
        padding: 12px;
        z-index: 1;
    }
    #filtro:hover #opcoes-filtro{
        display: flex;
        flex-direction: column;
        width: 200px;
        background-color: #ffffff;
    }
    main {
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }
    th, td {
        border-bottom: 1px solid black;
    }
    #card-tabela {
        background-color: #f3f3f3;
        border: 2px solid gray;
        border-radius: 10px;
        margin-top: 25px;
        margin-bottom: 25px;
        padding: 10px;
        width: 70vw;
        height: 75vh;
        overflow-y: auto;
        scrollbar-width: none;
        ::-webkit-scrollbar{
            display: none;
        }
    }
    footer {
        display: flex;
        justify-content: center;
    }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="GERMER" id="logo">
        <input id="pesquisa" class="search" type="search" placeholder="Buscar por ramal, nome, setor, status, celular ou e-mail..." />
        <div id="filtro">
            <img src="filtro.png" alt="">
            <div id="opcoes-filtro">
                <label><input type="checkbox" id="inativos">Ocultar Inativps</label>
                <label><input type="radio" name="opcoes" id="" value="RAMAL">Ordenar: Ramal</label>
                <label><input type="radio" name="opcoes" id="" value="NOME">Ordenar: Nome</label>
                <label><input type="radio" name="opcoes" id="" value="SETOR">Ordenar: Setor</label>
                <label><input type="radio" name="opcoes" id="" value="STATUS">Ordenar: Status</label>
            </div>
        </div>
    </header>
    <main>
        <div id="card-tabela">
            <table id="t">
                <thead id="cabecalho">
                    <tr>
                        <th>RAMAL</th>
                        <th>NOME</th>
                        <th>SETOR</th>
                        <th>STATUS</th>
                        <th>CELULAR</th>
                        <th>E-MAIL</th>
                    </tr>
                </thead>
                <tbody id="corpo">
                    
                </tbody>
            </table>
        </div>
    </main>
    <footer>
        Dica: use a busca para localizar rapidamente. Você pode abrir em qualquer navegador (arquivo .html).
    </footer>
    <script>
                document.addEventListener("DOMContentLoaded", () => {
        fetch("ramal (2).csv")
            .then(res => res.text())
            .then(texto => {
            montarTabela(texto);
            });
        });

        function montarTabela(texto) {

        texto = texto.replace(/\uFEFF/g, ""); // remove BOM invisível

        const linhas = texto.trim().split(/\r?\n/);

        const thead = document.getElementById("cabecalho");
        const tbody = document.getElementById("corpo");

        thead.innerHTML = "";
        tbody.innerHTML = "";

        // ===== CABEÇALHO =====
        const colunas = linhas[0].split(";");

        const trHead = document.createElement("tr");

        colunas.forEach(coluna => {
            const th = document.createElement("th");
            th.textContent = coluna.trim();
            trHead.appendChild(th);
        });

        thead.appendChild(trHead);

        // ===== CORPO =====
        for (let i = 1; i < linhas.length; i++) {

            if (!linhas[i].trim()) continue; // ignora linhas vazias

            const valores = linhas[i].split(";");

            const tr = document.createElement("tr");

            valores.forEach(valor => {
            const td = document.createElement("td");
            td.textContent = valor.trim();
            tr.appendChild(td);
            });

            tbody.appendChild(tr);
        }
        }


        (function() {
        const q = document.getElementById('pesquisa');
        const hideInactive = document.getElementById('inativos');
        const tbody = document.querySelector('#t tbody');

        function norm(s) {
            return (s || '').toString().toLowerCase()
            .normalize('NFD').replace(/\p{Diacritic}/gu,'');
        }

        function applyFilters() {
            const needle = norm(q.value);
            const hide = hideInactive.checked;

            const rows = Array.from(tbody.querySelectorAll('tr'));

            rows.forEach(tr => {
            const text = norm(tr.innerText);

            const status = tr.children[3]?.innerText.trim().toUpperCase();
            const inactive = status === 'INATIVO';

            const okSearch = !needle || text.includes(needle);
            const okStatus = !hide || !inactive;

            tr.style.display = (okSearch && okStatus) ? '' : 'none';
            });
        }

        function sortRows() {
            const selected = document.querySelector('input[name="opcoes"]:checked');
            const key = selected ? selected.value : 'RAMAL';

            const colIndex = {'RAMAL':0,'NOME':1,'SETOR':2,'STATUS':3}[key] ?? 0;

            const rows = Array.from(tbody.querySelectorAll('tr'));

            rows.sort((a,b) => {
            const av = (a.children[colIndex]?.innerText || '').trim();
            const bv = (b.children[colIndex]?.innerText || '').trim();

            if (key === 'RAMAL') {
                const an = parseInt(av.replace(/\D/g,''), 10);
                const bn = parseInt(bv.replace(/\D/g,''), 10);
                if (!isNaN(an) && !isNaN(bn)) return an - bn;
            }

            return av.localeCompare(bv, 'pt-BR', { sensitivity: 'base' });
            });

            rows.forEach(r => tbody.appendChild(r));
            applyFilters();
        }

        q.addEventListener('input', applyFilters);
        hideInactive.addEventListener('change', applyFilters);
        document.querySelectorAll('input[name="opcoes"]').forEach(r =>
            r.addEventListener('change', sortRows)
        );

        sortRows();
        applyFilters();
        })();
    </script>
</body>
</html>
